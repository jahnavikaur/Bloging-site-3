<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ledger — Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="masthead">
    <p class="wordmark">The Ledger</p>
    <p class="tagline">entries, in order</p>
</header>

<nav class="nav-bar">
    <a href="/create">+ New Entry</a>
    <a href="/logout">Logout</a>
</nav>

<main class="page">
    {% if posts %}
    <div class="entry-list">
        {% for post in posts %}
        <article class="entry">
            <div class="entry-date">{{ post[4] }}</div>
            <div>
                <h2 class="entry-title">{{ post[1] }}</h2>
                <p class="entry-body">{{ post[2] }}</p>
                <a class="entry-edit" href="/edit/{{ post[0] }}">EDIT</a>
                <a class="entry-delete" href="/delete/{{ post[0] }}">DELETE</a>
            </div>
        </article>
        {% endfor %}
    </div>
    {% else %}
    <p class="empty-state">No entries yet — write your first one.</p>
    {% endif %}
</main>

</body>
</html>
