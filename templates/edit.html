<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Entry — The Ledger</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<header class="masthead">
    <p class="wordmark">The Ledger</p>
    <p class="tagline">entries, in order</p>
</header>

<nav class="nav-bar">
    <a href="/">All Entries</a>
    <a href="/create">+ New Entry</a>
    <a href="/logout">Logout</a>
</nav>

<main class="page">
    <div class="form-card">
        <h2>Edit entry</h2>
        <form method="POST">
            <div class="field">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ post[1] }}" required>
            </div>
            <div class="field">
                <label for="content">Content</label>
                <textarea id="content" name="content" rows="8" required>{{ post[2] }}</textarea>
            </div>
            <button class="btn" type="submit">Save changes</button>
        </form>
    </div>
</main>

</body>
</html>
